{% load static %}<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Studio Login · Atelier Ink</title>
  <link rel="stylesheet" href="{% static 'staff/css/style.css' %}">
</head>
<body>
  <div class="login-page">
    <div class="login-box">
      <div class="mark">Atelier <em class="accent">Ink</em></div>
      <div class="sub">Lagos Studio</div>

      <div class="panel">
        <p class="eyebrow">Studio Panel</p>
        <h1>Sign In</h1>

        {% if form.non_field_errors %}
          <div class="form-error">{{ form.non_field_errors.0 }}</div>
        {% endif %}

        <form method="post">
          {% csrf_token %}
          <input type="hidden" name="next" value="{{ next }}">
          <div class="field">
            <label for="id_email">Email Address</label>
            {{ form.email }}
          </div>
          <div class="field">
            <label for="id_password">Password</label>
            {{ form.password }}
          </div>
          <button type="submit" class="btn btn-accent">Sign In</button>
        </form>
      </div>

      <p class="footnote">Staff and artist accounts only</p>
    </div>
  </div>
</body>
</html>
